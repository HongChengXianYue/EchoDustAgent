# LLM 服务配置。API Key 故意只从 AGENT_API_KEY 环境变量读取。
llm:
  # OpenAI 兼容接口的基础地址，不包含 /chat/completions 或 /responses 路径。
  base_url: https://anyrouter.top/v1
  # 发给服务商的模型名称。
  model: gpt-5.5
  # 协议形态：chat_completions 使用 /chat/completions；responses 使用 /responses。
  wire_api: responses
  # 单次 LLM HTTP 请求超时时间。
  request_timeout_seconds: 300
  # 是否允许模型在一次 assistant 回复中返回多个原生 tool call。
  parallel_tool_calls: true

# Agent 循环限制。
agent:
  # 单次用户请求最多执行多少轮 ReAct 循环，超过后报错停止。
  max_steps: 30
  # 单轮 assistant 回复中最多允许多少个非 update_todos 工具并行调用。
  max_parallel_tool_calls: 10

# 子代理配置。子代理用于隔离的只读研究任务，只回传最终结论。
subagents:
  # 是否启用 delegate_task 原生工具。
  enabled: true
  # 同一时间最多运行多少个子代理。
  max_concurrent: 5
  # 单个子代理最多执行多少轮 ReAct 循环。
  max_steps: 30
  # 子代理最终结论最多回传多少字节，超过后截断。
  result_max_bytes: 16888

# 持久记忆配置。文档记忆会在启动时加载一次并拼入 system prompt。
memory:
  # 是否启用 memory / remember / forget 工具和启动时记忆加载。
  enabled: true
  # 用户级记忆目录；支持 ~。项目记忆会按当前 workspace 分目录存放在这里。
  user_dir: ~/.local-agent

# MCP 服务配置。具体 server 安装和声明放在 dir/servers.json。
mcp:
  # 是否启动 MCP server 并把 MCP tools 注册为原生 function tools。
  enabled: true
  # MCP 安装和配置目录；默认读取 ~/.local-agent/mcp/servers.json。
  dir: ~/.local-agent/mcp
  # 单个 MCP server 初始化和 tools/list 的启动超时。
  start_timeout_seconds: 10
  # MCP tools/list 和 tools/call 单次请求超时。
  request_timeout_seconds: 60

# 上下文维护。优先裁剪旧工具输出，接近窗口上限时再压缩旧历史。
context:
  # 估算上下文窗口大小；当前用字符数近似 token，仅用于触发维护。
  window_tokens: 128000
  # 旧 tool result 的 output 超过多少字节后会被替换为裁剪标记。
  prune_tool_result_max_bytes: 8192
  # 最近多少条消息永远不裁剪，避免影响当前任务。
  prune_keep_recent_messages: 16
  # 是否启用自动 compaction。
  compact_enabled: true
  # 达到窗口多少百分比时触发 compaction。
  compact_ratio_percent: 80
  # 达到窗口多少百分比时强制 compaction，忽略最小消息数限制。
  compact_force_ratio_percent: 90
  # 压缩后目标 tail 预算上限占窗口百分比。
  compact_target_percent: 50
  # 压缩时最近 tail 原样保留的 token 预算。
  compact_keep_tail_tokens: 16000
  # 非强制压缩时，至少要有多少条旧消息可折叠。
  compact_min_messages: 4

# 内置工具限制和执行上限。
tools:
  # list_files 最多返回多少个目录项，超过后截断。
  list_max_entries: 200
  # find_files 默认最多返回多少个匹配路径。
  find_max_matches: 50
  # read_file 最多返回多少字节。
  read_file_max_bytes: 65536
  # search_files 最多返回多少条内容匹配结果。
  search_max_matches: 100
  # search_files 最多扫描多大的单个文件。
  search_max_file_bytes: 1048576
  # 模型未指定 timeout 时，run_command 使用的默认超时时间。
  command_default_timeout_seconds: 30
  # run_command 允许的最大超时时间。
  command_max_timeout_seconds: 120
  # run_command 最多返回多少 stdout/stderr 合并输出字节。
  command_output_max_bytes: 65536
  # apply_patch 的执行超时时间。
  apply_patch_timeout_seconds: 30
  # apply_patch 最多返回多少 patch 命令输出字节。
  apply_patch_output_max_bytes: 65536
  # 文件变更预览最多保留多少行变更内容。
  file_change_preview_lines: 20

# 终端 UI 渲染限制。
ui:
  # 横向分隔线宽度。
  separator_width: 80
  # 实时 Todo/Tools 区域最大高度。
  live_frame_max_lines: 24
  # 实时 Todo/Tools 区域最大宽度。
  live_frame_max_width: 100
  # 实时区域外预留的终端行数。
  live_frame_height_margin: 6
  # Tools 展开时最多展示多少条最近工具事件。
  max_expanded_live_tool_events: 6
  # 无法检测终端尺寸时，全量日志查看器使用的默认宽度。
  full_log_default_width: 100
  # 无法检测终端尺寸时，全量日志查看器使用的默认高度。
  full_log_default_height: 24
  # 全量日志查看器最小宽度。
  full_log_min_width: 20
  # 全量日志查看器最小高度。
  full_log_min_height: 6
  # 全量日志查看器读取按键的轮询间隔。
  full_log_poll_milliseconds: 30
  # Ctrl+E/Ctrl+T 实时快捷键监听的轮询间隔。
  toggle_poll_milliseconds: 40
  # 最终回答 Markdown 渲染的自动换行宽度。
  markdown_word_wrap: 100
  # 实时 UI 中普通工具输出预览的字符上限。
  tool_preview_output_chars: 2000
  # 命令输出摘要使用的较大预览字符上限。
  tool_preview_long_output_chars: 4000
  # 多文件变更摘要的预览字符上限。
  file_change_preview_chars: 800
  # 审批参数无法结构化展示时，JSON 兜底预览的字符上限。
  approval_args_preview_chars: 300
